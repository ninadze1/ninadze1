<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Перенос строки</title>
    </head>
    <body>
        <h1>Песня</h1>
        <p>
            Мы пойдем с тобой<br>
            С мотыльками и пчелой,<br>
            Побродить дремучим лесом,<br>
            Любуясь красотой.
        </p>
        <p>
            Мы пойдем с тобой<br>
            На утес, что под луной,<br>
            И увидим рек сиянье,<br>
            Назовем это мечтой.
        </p>
    </body>
</html>
